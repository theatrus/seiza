name: Release packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo install cargo-deb --locked
      - run: cargo deb -p seiza-cli
      - name: Rename with distro suffix
        run: |
          mkdir -p dist
          for f in target/debian/*.deb; do
            cp "$f" "dist/$(basename "${f%.deb}")-ubuntu.deb"
          done
      - uses: softprops/action-gh-release@v3.0.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.deb
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: deb
          path: dist/*.deb

  rpm:
    strategy:
      matrix:
        fedora: [43, 44]
    runs-on: ubuntu-latest
    container: fedora:${{ matrix.fedora }}
    steps:
      - name: Install build dependencies
        run: dnf install -y rust cargo rpm-build git
      - uses: actions/checkout@v7.0.0
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo install cargo-generate-rpm --locked
      - run: cargo build --release -p seiza-cli
      - run: ~/.cargo/bin/cargo-generate-rpm -p seiza-cli --payload-compress zstd
      - name: Rename with dist tag
        run: |
          mkdir -p dist
          for f in target/generate-rpm/*.rpm; do
            base=$(basename "$f" .rpm)
            cp "$f" "dist/${base}.fc${{ matrix.fedora }}.rpm"
          done
      - uses: softprops/action-gh-release@v3.0.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.rpm
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: rpm-fc${{ matrix.fedora }}
          path: dist/*.rpm

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo build --release -p seiza-cli
      - name: Verify Windows CRT is statically linked
        shell: pwsh
        run: ./.github/scripts/assert-static-crt.ps1 -Binary target/release/seiza.exe
      - name: Package ZIP and MSI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq "seiza-cli").version
          Compress-Archive -Path target/release/seiza.exe, README.md, LICENSE -DestinationPath "dist/seiza-cli-$version-windows-x86_64.zip"
          dotnet build packaging/windows/seiza.wixproj -c Release -p:SeizaVersion=$version
      - name: Smoke-test silent MSI install and uninstall
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq "seiza-cli").version
          $msi = Resolve-Path "dist/seiza-cli-$version-windows-x86_64.msi"
          ./.github/scripts/test-windows-installer.ps1 -Msi $msi
      - uses: softprops/action-gh-release@v3.0.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.zip
            dist/*.msi
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows
          path: |
            dist/*.zip
            dist/*.msi
