name: Release packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deb --locked
      - run: cargo deb -p seiza-cli
      - name: Rename with distro suffix
        run: |
          mkdir -p dist
          for f in target/debian/*.deb; do
            cp "$f" "dist/$(basename "${f%.deb}")-ubuntu.deb"
          done
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb

  rpm:
    strategy:
      matrix:
        fedora: [43, 44]
    runs-on: ubuntu-latest
    container: fedora:${{ matrix.fedora }}
    steps:
      - name: Install build dependencies
        run: dnf install -y rust cargo rpm-build git
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-generate-rpm --locked
      - run: cargo build --release -p seiza-cli
      - run: ~/.cargo/bin/cargo-generate-rpm -p seiza-cli --payload-compress zstd
      - name: Rename with dist tag
        run: |
          mkdir -p dist
          for f in target/generate-rpm/*.rpm; do
            base=$(basename "$f" .rpm)
            cp "$f" "dist/${base}.fc${{ matrix.fedora }}.rpm"
          done
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-fc${{ matrix.fedora }}
          path: dist/*.rpm
