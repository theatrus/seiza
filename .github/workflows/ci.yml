name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo test --workspace --all-features
      - run: cargo build --workspace --release --all-features
      - name: Verify Windows CRT is statically linked
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/assert-static-crt.ps1 -Binary target/release/seiza.exe
      - name: Build Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq "seiza-cli").version
          dotnet build packaging/windows/seiza.wixproj -c Release -p:SeizaVersion=$version
      - name: Smoke-test Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem dist/*.msi | Select-Object -First 1
          ./.github/scripts/test-windows-installer.ps1 -Msi $msi.FullName -Scope perUser
          ./.github/scripts/test-windows-installer.ps1 -Msi $msi.FullName -Scope perMachine
          ./.github/scripts/test-windows-installer.ps1 -Msi $msi.FullName -Scope perUser -WithoutPath
      - uses: actions/upload-artifact@v7.0.1
        if: runner.os == 'Windows'
        with:
          name: windows-installer
          path: dist/*.msi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Verify the workspace still compiles on its declared MSRV
  # (`rust-version` in [workspace.package]). Keep this toolchain in sync
  # with that field.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo check --workspace --all-targets --all-features

  integration:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo test -p seiza-cli --release --test hosted_integration -- --ignored
